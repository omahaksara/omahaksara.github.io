<!DOCTYPE html>
<html lang="id">
<head>
<script>
// REDIRECT FIX - Langsung ke alamat absolut agar tidak dobel link
const params = new URLSearchParams(window.location.search);
if (params.has('c')) {
  window.location.replace('https://omahaksara.github.io/invitation/templates/floral-pink/' + window.location.search + '&to=Tamu');
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Omah Aksara</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{ --bg:#FAF9F7; --primary:#9C7A54; --text:#2E2A27; --muted:#8A8178; --line:#E8E3DC; --white:#fff; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}

.hero{text-align:center;padding:100px 24px 60px;max-width:680px;margin:auto}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,6vw,48px)}
.catalog{padding:40px 24px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

.card{background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--line);transition:.3s}
.card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,.1)}
.thumb{aspect-ratio:4/5;overflow:hidden;background:#eee}
.thumb img{width:100%;height:100%;object-fit:cover}
.card-body{text-align:center;padding:20px}

.btn{display:block;padding:12px;font-size:13px;text-decoration:none;margin-top:8px;border-radius:8px;font-weight:500}
.btn-ghost{border:1px solid var(--line);color:var(--text)}
.btn-solid{background:var(--text);color:#fff}

.gallery-track{display:flex;gap:15px;padding:20px;width:max-content;animation:scroll 40s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.gallery-item{width:200px;height:280px;border-radius:8px;overflow:hidden}
.gallery-item img{width:100%;height:100%;object-fit:cover}

#notif{position:fixed;bottom:20px;left:20px;background:#fff;padding:12px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,.1);display:none;z-index:999;font-size:12px}
</style>
</head>

<body>

<section class="hero">
  <h1>Omah Aksara</h1>
  <p style="color:var(--primary);font-size:14px;margin-top:10px">Promo Terbatas: Undangan Digital Eksklusif 90K</p>
</section>

<section class="catalog">
  <div id="catalog-grid" class="grid"></div>
</section>

<section class="gallery">
  <div style="text-align:center;margin-bottom:20px"><h2>Hasil Jadi Klien</h2></div>
  <div style="overflow:hidden">
    <div class="gallery-track" id="gallery-track"></div>
  </div>
</section>

<div id="notif"></div>

<script>
const wa = "6285796461157";

// 1. RENDER KATALOG - FIX LINK DOBEL
async function loadKatalog() {
  try {
    const res = await fetch('https://api.github.com/repos/omahaksara/invitation/contents/templates');
    const data = await res.json();
    const folders = data.filter(i => i.type === "dir");
    
    const grid = document.getElementById('catalog-grid');
    grid.innerHTML = "";
    
    folders.forEach(f => {
      const name = f.name.replace(/-/g, ' ').toUpperCase();
      const img = `https://raw.githubusercontent.com/omahaksara/invitation/main/templates/${f.name}/preview.jpg`;
      
      // ALAMAT ABSOLUT - AGAR TIDAK DOBEL
      const linkDemo = `https://omahaksara.github.io/invitation/templates/${f.name}/?c=budi-ani&to=Nama+Tamu`;
      const linkWA = `https://wa.me/${wa}?text=Halo, saya mau template ${name} promo 90K`;

      grid.innerHTML += `
        <div class="card">
          <div class="thumb"><img src="${img}" onerror="this.src='https://placehold.co/400x500?text=Preview'"></div>
          <div class="card-body">
            <h3 style="font-size:16px">${name}</h3>
            <p style="font-size:13px;margin:10px 0"><s>150rb</s> <strong style="color:var(--primary)">90K</strong></p>
            <a href="${linkDemo}" target="_blank" class="btn btn-ghost">Lihat Demo</a>
            <a href="${linkWA}" target="_blank" class="btn btn-solid">Ambil Promo 90K</a>
          </div>
        </div>`;
    });
  } catch(e) { console.error(e); }
}

// 2. LOAD ALBUM - FIX FOTO HILANG
async function loadAlbum() {
  try {
    // Ambil dari repo INVITATION tempat fotonya berada
    const res = await fetch('https://api.github.com/repos/omahaksara/invitation/contents/album');
    const files = await res.json();
    const images = files.filter(f => /\.(jpg|jpeg|png|webp)$/i.test(f.name));
    
    const track = document.getElementById('gallery-track');
    // Duplikasi untuk animasi jalan terus
    [...images, ...images].forEach(img => {
      track.innerHTML += `<div class="gallery-item"><img src="${img.download_url}"></div>`;
    });
  } catch(e) { console.error("Album gagal: ", e); }
}

// 3. FAKE NOTIF
const names = ["Andi","Siti","Rina","Budi","Dewi","Fajar"];
setInterval(() => {
  const n = names[Math.floor(Math.random()*names.length)];
  const notif = document.getElementById('notif');
  notif.innerText = n + " baru saja checkout promo 90K";
  notif.style.display = "block";
  setTimeout(() => notif.style.display = "none", 4000);
}, 12000);

loadKatalog();
loadAlbum();
</script>

</body>
</html>
