<!DOCTYPE html>
<html lang="id">
<head>

<script>
if (location.search.includes('c=')) {
  const url = '/invitation/' + location.search;
  fetch(url, { method: 'HEAD' })
    .then(res => { if (res.ok) location.replace(url); })
    .catch(() => {});
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Omah Aksara — Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#FAF9F7;
  --primary:#9C7A54;
  --text:#2E2A27;
  --muted:#8A8178;
  --line:#E8E3DC;
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  font-weight:300;
}

h1,h2,h3{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.5px;
}

.hero{
  text-align:center;
  padding:120px 24px 80px;
}

.logo{
  letter-spacing:4px;
  color:var(--primary);
  margin-bottom:30px;
}

.hero h1{
  font-size:42px;
  margin-bottom:16px;
}

.hero p{
  color:var(--muted);
  font-weight:400;
}

.catalog{
  padding:40px 24px 80px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-body{
  padding:16px;
  text-align:center;
}

.price{
  font-size:13px;
  color:var(--muted);
  margin:10px 0;
}

.btn{
  display:block;
  padding:10px;
  margin-top:8px;
  text-decoration:none;
  font-size:13px;
}

.btn-ghost{
  border:1px solid var(--line);
  color:var(--text);
}

.btn-solid{
  background:var(--text);
  color:#fff;
}

.cta{
  text-align:center;
  padding:80px 24px;
}

.btn-main{
  display:inline-block;
  padding:14px 30px;
  background:var(--text);
  color:#fff;
  text-decoration:none;
}

.sticky-wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--text);
  color:#fff;
  padding:10px 16px;
  border-radius:30px;
  font-size:13px;
}
</style>

</head>

<body>

<header class="hero">
  <div class="logo">Omah Aksara</div>
  <h1>Undangan Digital Elegan<br>Tanpa Ribet & Hemat</h1>
  <p>Desain modern, bisa custom, langsung kirim tanpa batas</p>
  <p style="margin-top:10px;color:var(--primary)">⭐ 4.9/5 dari 1.200+ pasangan</p>
</header>

<section class="catalog">
  <div class="grid" id="catalog-grid"></div>
</section>

<section class="cta">
  <h2>Mulai Undangan Digitalmu</h2>
  <p style="margin:16px 0;color:var(--muted)">
    Tanpa ribet • Bisa custom • Respon cepat
  </p>
  <a class="btn-main"
  href="https://wa.me/6285796461157?text=Halo Omah Aksara, saya mau konsultasi undangan digital pernikahan"
  target="_blank">Konsultasi WhatsApp</a>
</section>

<a href="https://wa.me/6285796461157?text=Halo Omah Aksara, saya mau tanya undangan digital"
class="sticky-wa" target="_blank">Chat WA</a>

<script>
const grid = document.getElementById('catalog-grid');
const waNumber = '6285796461157';

function toTitleCase(str){
  return str.replace(/-/g,' ')
    .split(' ')
    .map(w=>w.charAt(0).toUpperCase()+w.slice(1))
    .join(' ');
}

async function loadCatalog(){
  try{
    const res = await fetch('https://api.github.com/repos/omahaksara/invitation/contents/templates');
    const data = await res.json();
    const folders = data.filter(i=>i.type==='dir').map(i=>i.name);

    folders.forEach(folder=>{
      const name = toTitleCase(folder);

      const thumb = `https://raw.githubusercontent.com/omahaksara/invitation/main/templates/${folder}/preview.jpg`;
      const demo = `https://omahaksara.github.io/invitation/templates/${folder}/?c=demo&to=Nama-Tamu`;

      const waLink = `https://wa.me/${waNumber}?text=Halo Omah Aksara, saya tertarik dengan template *${name}*. Bisa minta detailnya?`;

      const card = document.createElement('div');
      card.className='card';

      card.innerHTML=`
        <div class="thumb">
          <img src="${thumb}" onerror="this.src='https://images.unsplash.com/photo-1519741497674-611481863552?w=400'">
        </div>
        <div class="card-body">
          <h3>${name}</h3>
          <p class="price">Mulai 100rb • All in</p>
          <a href="${demo}" target="_blank" class="btn btn-ghost">Preview</a>
          <a href="${waLink}" target="_blank" class="btn btn-solid">Pesan</a>
        </div>
      `;

      grid.appendChild(card);
    });

  }catch{
    grid.innerHTML = "<p style='text-align:center'>Katalog gagal dimuat</p>";
  }
}

loadCatalog();
</script>

</body>
</html>
