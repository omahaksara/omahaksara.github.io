<!DOCTYPE html>
<html lang="id">
<head>

<!-- ================= REDIRECT AMAN ================= -->
<script>
if (location.search.includes('c=')) {
  const url = '/invitation/' + location.search;
  fetch(url,{method:'HEAD'}).then(r=>{
    if(r.ok) location.replace(url);
  }).catch(()=>{});
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f9fafb;
color:#111;
}

/* ================= CONTAINER ================= */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ================= HERO ================= */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
font-size:26px;
font-weight:600;
}

.hero p{
font-size:14px;
color:#666;
margin-top:6px;
}

/* ================= CTA ================= */
.cta{
margin-top:15px;
display:inline-block;
background:#111;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:14px;
text-decoration:none;
}

/* ================= FILTER ================= */
.filter{
display:flex;
gap:10px;
margin-top:30px;
flex-wrap:wrap;
}

.filter button{
border:none;
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:12px;
}

.filter button.active{
background:#111;
color:#fff;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

/* ================= CARD ================= */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
}

.card .info{
padding:10px;
font-size:13px;
}

.card .btn{
display:block;
text-align:center;
background:#111;
color:#fff;
padding:8px;
margin:10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
}

/* ================= FOOTER ================= */
.footer{
text-align:center;
font-size:12px;
color:#888;
margin:40px 0;
}

</style>
</head>

<body>

<div class="container">

<!-- ================= HERO ================= -->
<div class="hero">
<h1>Undangan Digital</h1>
<p>Simple, modern, langsung kirim</p>
<a href="https://wa.me/628xxxxxxxxxx" class="cta">Pesan via WhatsApp</a>
</div>

<!-- ================= FILTER ================= -->
<div class="filter">
<button onclick="setFilter('all')" class="active">Semua</button>
<button onclick="setFilter('premium')">Premium</button>
<button onclick="setFilter('simple')">Simple</button>
</div>

<!-- ================= GRID ================= -->
<div class="grid" id="grid"></div>

<!-- ================= FOOTER ================= -->
<div class="footer">
© 2026 Undangan Digital
</div>

</div>

<!-- ================= SOCIAL PROOF ================= -->
<div id="toast" style="position:fixed;bottom:20px;left:20px;background:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);font-size:13px;opacity:0;transform:translateY(20px);transition:.4s;z-index:999;"></div>

<div id="visitorBox" style="position:fixed;bottom:80px;left:20px;background:#fff;padding:8px 14px;border-radius:100px;font-size:12px;box-shadow:0 6px 20px rgba(0,0,0,.08);z-index:998;display:flex;gap:6px;align-items:center;">
<span style="width:8px;height:8px;background:#22c55e;border-radius:50%"></span>
<span><b id="visitorCount">0</b> orang melihat</span>
</div>

<script>

/* ================= DATA TEMPLATE ================= */
/* 👉 GANTI INI KE API GITHUB KAMU NANTI */
const DATA = [
{nama:"Elegant 01",kategori:"premium",img:"https://picsum.photos/400/600?1",link:"#"},
{nama:"Modern 02",kategori:"premium",img:"https://picsum.photos/400/600?2",link:"#"},
{nama:"Simple 03",kategori:"simple",img:"https://picsum.photos/400/600?3",link:"#"},
{nama:"Minimal 04",kategori:"simple",img:"https://picsum.photos/400/600?4",link:"#"}
];

let currentFilter="all";

/* ================= RENDER ================= */
function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

DATA.filter(d=>currentFilter==="all"||d.kategori===currentFilter)
.forEach(d=>{
grid.innerHTML+=`
<div class="card">
<img src="${d.img}">
<div class="info">${d.nama}</div>
<a href="${d.link}" class="btn">Lihat</a>
</div>`;
});
}

render();

/* ================= FILTER ================= */
function setFilter(f){
currentFilter=f;
document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
render();
}

/* ================= SOCIAL PROOF ================= */
const FIRST=["Ahmad","Rizky","Ayu","Putri","Nabila","Fajar"];
const LAST=["Saputra","Wijaya","Utami","Sari"];

const ACTIONS=["baru order","sedang lihat","checkout"];

function getName(){
return FIRST[Math.random()*FIRST.length|0]+" "+LAST[Math.random()*LAST.length|0];
}

const toast=document.getElementById("toast");

function showToast(t){
toast.innerText=t;
toast.style.opacity="1";
toast.style.transform="translateY(0)";
setTimeout(()=>{
toast.style.opacity="0";
toast.style.transform="translateY(20px)";
},3000);
}

let visitor=parseInt(localStorage.getItem("visitor"))||20;

function updateVisitor(){
visitor+=Math.random()*2|0;
document.getElementById("visitorCount").innerText=visitor;
localStorage.setItem("visitor",visitor);
}

document.getElementById("visitorCount").innerText=visitor;

function loopNotif(){
showToast(getName()+" "+ACTIONS[Math.random()*ACTIONS.length|0]);
if(Math.random()>0.5) updateVisitor();
setTimeout(loopNotif,Math.random()*6000+4000);
}

setTimeout(()=>{
showToast(getName()+" sedang melihat katalog");
loopNotif();
},3000);

</script>

</body>
</html>
