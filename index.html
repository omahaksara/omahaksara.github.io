<!DOCTYPE html>
<html lang="id">
<head>

<!-- ================= REDIRECT ASLI KAMU ================= -->
<script>
// redirect ke folder invitation kalau ada parameter
if (location.search.includes('c=')) {
  const target = '/invitation/' + location.search;
  fetch(target,{method:'HEAD'}).then(r=>{
    if(r.ok) location.replace(target);
  }).catch(()=>{});
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f9fafb;
color:#111;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ================= HERO ================= */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
font-size:26px;
font-weight:600;
}

.hero p{
font-size:14px;
color:#666;
margin-top:6px;
}

/* ================= CTA ================= */
.cta{
margin-top:15px;
display:inline-block;
background:#111;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:14px;
text-decoration:none;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:30px;
}

/* ================= CARD ================= */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card .info{
padding:10px;
font-size:13px;
}

.card a{
display:block;
text-align:center;
background:#111;
color:#fff;
padding:8px;
margin:10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
}

/* ================= FOOTER ================= */
.footer{
text-align:center;
font-size:12px;
color:#888;
margin:40px 0;
}

</style>
</head>

<body>

<div class="container">

<!-- ================= HERO ================= -->
<div class="hero">
<h1>Undangan Digital</h1>
<p>Praktis, modern, siap kirim</p>
<a href="https://wa.me/628xxxxxxxxxx" class="cta">Pesan via WhatsApp</a>
</div>

<!-- ================= GRID ================= -->
<div class="grid" id="grid"></div>

<div class="footer">© 2026</div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

/* ================= AUTO AMBIL TEMPLATE ================= */
/*
INI IKUT SISTEM REPO KAMU:
anggap kamu sudah punya global data / atau inject list folder
kalau sebelumnya kamu sudah punya script list template,
TINGGAL sambung ke render di bawah
*/

// fallback manual (biar gak blank kalau gagal)
let TEMPLATE = [
  "elegant-01",
  "modern-02",
  "simple-03",
  "luxury-04"
];

/* ================= RENDER ================= */
function render(){
const grid = document.getElementById("grid");
grid.innerHTML = "";

TEMPLATE.forEach(slug=>{
grid.innerHTML += `
<div class="card">
<img src="/invitation/${slug}/cover.jpg" loading="lazy">
<div class="info">${slug.replace('-',' ').toUpperCase()}</div>
<a href="/invitation/${slug}">Lihat</a>
</div>
`;
});
}

render();

/* ================= SOCIAL PROOF ================= */
const FIRST=["Ahmad","Rizky","Ayu","Putri","Nabila"];
const LAST=["Saputra","Wijaya","Utami","Sari"];
const ACTIONS=["baru order","sedang lihat","checkout"];

function getName(){
return FIRST[Math.random()*FIRST.length|0]+" "+LAST[Math.random()*LAST.length|0];
}

const toast=document.createElement("div");
toast.style.cssText="position:fixed;bottom:20px;left:20px;background:#fff;padding:12px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.1);font-size:13px;opacity:0;transition:.4s;z-index:999";
document.body.appendChild(toast);

function showToast(t){
toast.innerText=t;
toast.style.opacity="1";
setTimeout(()=>toast.style.opacity="0",3000);
}

function loop(){
showToast(getName()+" "+ACTIONS[Math.random()*ACTIONS.length|0]);
setTimeout(loop,5000+Math.random()*5000);
}

setTimeout(loop,3000);

</script>

</body>
</html>
