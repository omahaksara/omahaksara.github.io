<!DOCTYPE html>
<html lang="id">
<head>

<!-- ================= REDIRECT AMAN ================= -->
<script>
if (location.search.includes('c=')) {
  const target = '/invitation/' + location.search;
  fetch(target,{method:'HEAD'}).then(r=>{
    if(r.ok) location.replace(target);
  }).catch(()=>{});
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f9fafb;
color:#111;
}

/* ================= CONTAINER ================= */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ================= HERO ================= */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
font-size:26px;
font-weight:600;
}

.hero p{
font-size:14px;
color:#666;
margin-top:6px;
}

/* ================= CTA ================= */
.cta{
margin-top:15px;
display:inline-block;
background:#111;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:14px;
text-decoration:none;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:30px;
}

/* ================= CARD ================= */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.info{
padding:10px;
font-size:13px;
}

.btn{
display:block;
text-align:center;
background:#111;
color:#fff;
padding:8px;
margin:10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
}

/* ================= FOOTER ================= */
.footer{
text-align:center;
font-size:12px;
color:#888;
margin:40px 0;
}

</style>
</head>

<body>

<div class="container">

<!-- ================= HERO ================= -->
<div class="hero">
<h1>Undangan Digital</h1>
<p>Simple, modern, langsung kirim</p>
<a href="https://wa.me/628xxxxxxxxxx" class="cta">Pesan via WhatsApp</a>
</div>

<!-- ================= GRID ================= -->
<div class="grid" id="grid">
Loading template...
</div>

<div class="footer">© 2026 Omah Aksara</div>

</div>

<!-- ================= SOCIAL PROOF ================= -->
<div id="toast" style="
position:fixed;
bottom:20px;
left:20px;
background:#fff;
padding:12px 16px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
font-size:13px;
opacity:0;
transform:translateY(20px);
transition:.4s;
z-index:999;"></div>

<div id="visitorBox" style="
position:fixed;
bottom:80px;
left:20px;
background:#fff;
padding:8px 14px;
border-radius:100px;
font-size:12px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
z-index:998;
display:flex;
gap:6px;
align-items:center;">
<span style="width:8px;height:8px;background:#22c55e;border-radius:50%"></span>
<span><b id="visitorCount">0</b> orang melihat</span>
</div>

<!-- ================= SCRIPT ================= -->
<script>

/* ================= CONFIG ================= */
const USER = "omahaksara";
const REPO = "omahaksara.github.io";

/* ================= LOAD TEMPLATE DARI GITHUB ================= */
async function loadTemplates(){
  const url = `https://api.github.com/repos/${USER}/${REPO}/contents/invitation`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    const folders = data.filter(item => item.type === "dir");

    render(folders);
  }catch(e){
    document.getElementById("grid").innerHTML = "Gagal load template";
  }
}

/* ================= RENDER ================= */
function render(folders){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  folders.forEach(f => {
    grid.innerHTML += `
      <div class="card">
        <img src="/invitation/${f.name}/cover.jpg" loading="lazy">
        <div class="info">${f.name.replaceAll('-', ' ')}</div>
        <a href="/invitation/${f.name}" class="btn">Lihat</a>
      </div>
    `;
  });
}

loadTemplates();

/* ================= SOCIAL PROOF ================= */
const FIRST=["Ahmad","Rizky","Ayu","Putri","Nabila","Fajar"];
const LAST=["Saputra","Wijaya","Utami","Sari"];
const ACTIONS=["baru order","sedang lihat","checkout"];

function getName(){
return FIRST[Math.random()*FIRST.length|0]+" "+LAST[Math.random()*LAST.length|0];
}

const toast=document.getElementById("toast");

function showToast(t){
toast.innerText=t;
toast.style.opacity="1";
toast.style.transform="translateY(0)";
setTimeout(()=>{
toast.style.opacity="0";
toast.style.transform="translateY(20px)";
},3000);
}

/* ================= VISITOR ================= */
let visitor=parseInt(localStorage.getItem("visitor"))||20;

function updateVisitor(){
visitor+=Math.random()*2|0;
document.getElementById("visitorCount").innerText=visitor;
localStorage.setItem("visitor",visitor);
}

document.getElementById("visitorCount").innerText=visitor;

/* ================= LOOP NOTIF ================= */
function loopNotif(){
showToast(getName()+" "+ACTIONS[Math.random()*ACTIONS.length|0]);

if(Math.random()>0.5) updateVisitor();

setTimeout(loopNotif,Math.random()*6000+4000);
}

setTimeout(()=>{
showToast(getName()+" sedang melihat katalog");
loopNotif();
},3000);

</script>

</body>
</html>
