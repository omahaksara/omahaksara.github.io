<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Omah Aksara - Template Undangan Elegan</title>

<!-- REDIRECT AMAN -->
<script>
  if (location.search.includes('c=')) {
    (async () => {
      try {
        const res = await fetch('/invitation' + location.search, { method: 'HEAD' });
        if (res.ok) location.replace('/invitation' + location.search);
      } catch(e) { console.warn('Redirect check failed:', e); }
    })();
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAF9F7;
    --bg-soft: #F3F0EB;
    --primary: #9C7A54;
    --primary-dark: #7d6143;
    --text: #2E2A27;
    --muted: #8A8178;
    --line: #E8E3DC;
    --white: #fff;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.04);
    --shadow-md: 0 10px 30px rgba(0,0,0,.08);
    --radius: 12px;
    --transition: .4s cubic-bezier(.2,.8,.2,1);
  }

    * { margin: 0; padding: 0; box-sizing: border-box }
  
  html { scroll-behavior: smooth }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  img { display: block; max-width: 100% }
  button { font: inherit; cursor: pointer; border: 0; background: none }

  /* REVEAL ANIMATION */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .8s var(--transition), transform .8s var(--transition);
  }
  .reveal.is-visible {
    opacity: 1;
    transform: none;
  }

  /* LAYOUT */
  .container {
    width: min(1100px, 92%);
    margin-inline: auto;
  }
  
  .section { padding: 60px 0 }
  .section-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 600;
    line-height: 1.2;
  }
  .section-subtitle {
    color: var(--muted);
    margin-top: 12px;
    font-size: 16px;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 120px 24px 80px;
    background: var(--bg-soft);
  }

  /* GRID & CARD */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-md);
  }
  
  .card__thumb {
    aspect-ratio: 4/5;
    background: var(--bg-soft);
    overflow: hidden;
  }
  .card__thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .6s var(--transition);
  }
  .card:hover .card__thumb img { transform: scale(1.05) }
  
  .card__body { padding: 20px }
  .card__title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    text-transform: capitalize;
    text-align: center;
  }
  
  .card__actions {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    padding: 12px 16px;
    border-radius: 8px;
    text-decoration: none;
    text-align: center;
    font-weight: 500;
    font-size: 14px;
    transition: all .25s ease;
  }
  .btn--solid {
    background: var(--text);
    color: var(--white);
  }
  .btn--solid:hover { background: #000 }
  .btn--ghost {
    border: 1px solid var(--line);
    color: var(--text);
  }
  .btn--ghost:hover {
    border-color: var(--text);
    background: var(--bg-soft);
  }

  /* TOAST NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--white);
    padding: 14px 16px;
    font-size: 13px;
    border-radius: 10px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--line);
    transform: translateX(-120%);
    opacity: 0;
    transition: all .5s var(--transition);
    z-index: 999;
    max-width: 280px;
  }
  .toast.is-show {
    transform: translateX(0);
    opacity: 1;
  }

  /* VISITOR BADGE */
  .visitor-badge {
    position: fixed;
    bottom: 80px;
    left: 20px;
    background: var(--white);
    padding: 10px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--line);
    z-index: 998;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .visitor-badge__dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1 }
    50% { opacity: .5 }
  }

  /* MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    display: grid;
    place-items: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: all .3s ease;
    z-index: 1000;
  }
  .modal.is-open {
    opacity: 1;
    visibility: visible;
  }
  .modal__content {
    background: var(--white);
    border-radius: var(--radius);
    width: min(500px, 100%);
    padding: 24px;
    transform: scale(.95);
    transition: transform .3s ease;
  }
  .modal.is-open .modal__content { transform: scale(1) }
  .modal__close {
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 8px;
    line-height: 1;
  }
</style>
</head>

<body>

<header class="hero reveal">
  <div class="container">
    <h1 class="section-title">Omah Aksara</h1>
    <p class="section-subtitle">Kumpulan template undangan digital elegan, siap pakai dalam hitungan menit</p>
  </div>
</header>

<main>
  <section class="section reveal">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Pilih Desain Favoritmu</h2>
        <p class="section-subtitle">Semua template sudah responsive & support musik</p>
      </div>
      <div class="grid" id="catalog-grid"></div>
    </div>
  </section>
</main>

<!-- UI COMPONENTS -->
<div class="toast" id="toast"></div>

<div class="visitor-badge" id="visitor-badge">
  <span class="visitor-badge__dot"></span>
  <span><b id="visitor-count">0</b> orang melihat</span>
</div>

<!-- DEMO MODAL -->
<div class="modal" id="demo-modal">
  <div class="modal__content">
    <button class="modal__close" id="modal-close">✕</button>
    <h3 style="font-family:'Cormorant Garamond';font-size:24px;margin-bottom:8px">Preview Template</h3>
    <p class="section-subtitle" id="modal-text" style="text-align:left;margin:0 0 20px"></p>
    <a href="#" class="btn btn--solid" style="width:100%">Lihat Demo Lengkap</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  
  // ===============================
  // CONFIG & DATA
  // ===============================
  const CONFIG = {
    visitorBase: 40,
    notifDelay: 4000,
    notifInterval: { min: 5000, max: 12000 },
    toastDuration: 3500,
  };

  const CATALOG_DATA = [
    { id: 'classic', name: 'Classic', img: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=600&auto=format&fit=crop' },
    { id: 'modern', name: 'Modern', img: 'https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=600&auto=format&fit=crop' },
    { id: 'floral', name: 'Floral', img: 'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=600&auto=format&fit=crop' },
    { id: 'minimal', name: 'Minimal', img: 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600&auto=format&fit=crop' },
  ];

  const NAMES = {
    first: ["Ahmad","Rizky","Dimas","Ayu","Putri","Nabila","Fajar","Yoga","Bayu","Dewi","Eka","Gita"],
    last: ["Saputra","Wijaya","Pratama","Utami","Sari","Ramadhan","Hidayat","Kusuma"]
  };
  
  const ACTIVITIES = ["sedang melihat katalog", "baru saja ambil promo", "tertarik template ini", "checkout template"];

  // ===============================
  // MODULE: Reveal on Scroll
  // ===============================
  const initReveal = () => {
    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
  };

  // ===============================
  // MODULE: Catalog
  // ===============================
  const initCatalog = () => {
    const grid = document.getElementById("catalog-grid");
    grid.innerHTML = CATALOG_DATA.map(item => `
      <article class="card">
        <div class="card__thumb">
          <img src="${item.img}" alt="Template ${item.name}" loading="lazy">
        </div>
        <div class="card__body">
          <h3 class="card__title">${item.name}</h3>
          <div class="card__actions">
            <button class="btn btn--ghost js-demo-btn" data-name="${item.name}">Lihat Demo</button>
            <a href="https://wa.me/6281234567890?text=Halo, saya mau order template ${item.name}" target="_blank" class="btn btn--solid">Order via WA</a>
          </div>
        </div>
      </article>
    `).join('');
  };

  // ===============================
  // MODULE: Social Proof
  // ===============================
  const initSocialProof = () => {
    const toastEl = document.getElementById("toast");
    const visitorEl = document.getElementById("visitor-count");
    let toastTimeout;

    const getRandomName = () => {
      const first = NAMES.first[Math.floor(Math.random() * NAMES.first.length)];
      const last = NAMES.last[Math.floor(Math.random() * NAMES.last.length)];
      return `${first} ${last}`;
    };

    const showToast = (message) => {
      clearTimeout(toastTimeout);
      toastEl.textContent = message;
      toastEl.classList.add("is-show");
      toastTimeout = setTimeout(() => {
        toastEl.classList.remove("is-show");
      }, CONFIG.toastDuration);
    };
    
    // Visitor Counter
    let visitorCount = parseInt(localStorage.getItem("visitorCount")) || Math.floor(Math.random() * 20) + CONFIG.visitorBase;
    const updateVisitor = () => {
      visitorCount += Math.floor(Math.random() * 2) + 1;
      visitorEl.textContent = visitorCount;
      localStorage.setItem("visitorCount", visitorCount);
    };
    visitorEl.textContent = visitorCount;

    // Notif Loop
    const triggerNotif = () => {
      const name = getRandomName();
      const activity = ACTIVITIES[Math.floor(Math.random() * ACTIVITIES.length)];
      showToast(`${name} ${activity}`);
      if (Math.random() > 0.4) updateVisitor();
      
      const nextInterval = Math.random() * (CONFIG.notifInterval.max - CONFIG.notifInterval.min) + CONFIG.notifInterval.min;
      setTimeout(triggerNotif, nextInterval);
    };

    setTimeout(() => {
      showToast(`${getRandomName()} sedang melihat katalog`);
      setTimeout(triggerNotif, CONFIG.notifInterval.min);
    }, CONFIG.notifDelay);
  };

  // ===============================
  // MODULE: Modal
  // ===============================
  const initModal = () => {
    const modal = document.getElementById("demo-modal");
    const modalText = document.getElementById("modal-text");
    const closeBtn = document.getElementById("modal-close");

    const openModal = (templateName) => {
      modalText.textContent = `Ini adalah preview untuk template "${templateName}". Fitur lengkap bisa dilihat di demo live.`;
      modal.classList.add("is-open");
    };
    const closeModal = () => modal.classList.remove("is-open");

    document.getElementById("catalog-grid").addEventListener("click", e => {
      if (e.target.matches(".js-demo-btn")) {
        openModal(e.target.dataset.name);
      }
    });

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", e => {
      if (e.target === modal) closeModal();
    });
  };

  // ===============================
  // INIT ALL
  // ===============================
  initReveal();
  initCatalog();
  initSocialProof();
  initModal();
});
</script>

</body>
</html>
