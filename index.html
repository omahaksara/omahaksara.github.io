<!DOCTYPE html>
<html lang="id">
<head>
<script>
// REDIRECT AMAN - GAK BIKIN BLANK KALO FOLDER BELUM ADA
if (location.search.includes('c=')) {
  const testUrl = '/invitation/' + location.search;
  fetch(testUrl, {method: 'HEAD'}).then(r => {
    if (r.ok) location.replace(testUrl);
  }).catch(() => {});
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Omah Aksara — Undangan Digital 90K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#FAF9F7;
--bg-soft:#F3F0EB;
--primary:#9C7A54;
--text:#2E2A27;
--muted:#8A8178;
--line:#E8E3DC;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
letter-spacing:.2px;
min-height:100vh;
-webkit-font-smoothing:antialiased;
}

.reveal{opacity:0;transform:translateY(16px);transition:opacity.8s ease,transform.8s ease}
.reveal.active{opacity:1;transform:translateY(0)}

.hero{
text-align:center;
padding:100px 24px 60px;
max-width:680px;
margin:auto;
}
.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:clamp(34px,6vw,48px);
color:var(--text);
line-height:1.1;
}
.hero p{margin-top:12px;color:var(--muted);font-size:15px}

.social-proof{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:var(--primary);
margin-top:24px;
}

#countdown{
font-size:13px;
color:var(--primary);
margin-top:10px;
font-weight:500;
}

.catalog{
padding:40px 24px 60px;
max-width:1200px;
margin:auto;
}
.catalog-head{
text-align:center;
margin-bottom:40px;
}
.catalog-head h2{
font-family:'Cormorant Garamond',serif;
font-size:clamp(26px,4vw,34px);
margin-bottom:8px;
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr);gap:24px}}
@media(min-width:1100px){.grid{grid-template-columns:repeat(4,1fr)}}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
border:1px solid var(--line);
transition:.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 50px -20px rgba(0,0,0,.15);
}
.thumb{aspect-ratio:4/5;overflow:hidden;background:var(--bg-soft)}
.thumb img{
width:100%;height:100%;
object-fit:cover;
transform:scale(1.05);
transition:1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.card:hover img{transform:scale(1.12)}

.card-body{
text-align:center;
padding:18px 16px 20px;
}
.card-body h3{
font-family:'Cormorant Garamond',serif;
font-size:17px;
font-weight:500;
}

.price{
font-size:13px;
margin:10px 0 14px;
}
.price s{color:#aaa;margin-right:6px}
.price strong{color:var(--primary)}

.btn{
display:block;
padding:11px;
font-size:13px;
text-decoration:none;
margin-top:6px;
border-radius:8px;
font-weight:500;
transition:.3s;
}
.btn:active{transform:scale(0.97)}

.btn-ghost{
border:1.5px solid var(--line);
color:var(--text);
}
.btn-ghost:hover{border-color:var(--primary);background:rgba(156,122,84,.06)}

.btn-solid{
background:var(--text);
color:#fff;
position:relative;
overflow:hidden;
}
.btn-solid:hover{background:var(--primary)}

.btn-solid::after{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.3),transparent);
}
.btn-solid:hover::after{
left:100%;
transition:.6s;
}

.gallery{
padding:40px 0 100px;
overflow:hidden;
}
.gallery-head{
text-align:center;
margin-bottom:32px;
padding:0 24px;
}
.gallery-head h2{
font-family:'Cormorant Garamond',serif;
font-size:clamp(26px,4vw,32px);
margin-bottom:8px;
}
.gallery-head p{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}

.gallery-wrap{
overflow-x:auto;
overflow-y:hidden;
padding:0 24px 20px;
cursor:grab;
scrollbar-width:none;
-webkit-overflow-scrolling:touch;
touch-action:pan-x;
}
.gallery-wrap::-webkit-scrollbar{display:none}
.gallery-wrap.active{cursor:grabbing}

.gallery-track{
display:flex;
gap:20px;
width:max-content;
}
.gallery-track.auto{
animation:scrollGallery 60s linear infinite;
}
.gallery-wrap:hover .gallery-track.auto,
.gallery-wrap.active .gallery-track.auto{
animation-play-state:paused;
}

.gallery-item{
flex:0 0 240px;
aspect-ratio:3/4;
overflow:hidden;
border-radius:8px;
}
.gallery-item img{
width:100%;height:100%;object-fit:cover;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}
@media(max-width:480px){.gallery-item{flex:0 0 200px}}

@keyframes scrollGallery{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

#notif{
position:fixed;
bottom:20px;
left:20px;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
padding:12px 16px;
font-size:12px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
border:1px solid var(--line);
display:none;
z-index:998;
animation:slideIn.4s ease;
}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

.sticky-wa{
position:fixed;
bottom:20px;
right:20px;
background:var(--text);
color:#fff;
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 24px rgba(0,0,0,.15);
z-index:999;
transition:.3s;
}
.sticky-wa:hover{background:var(--primary);transform:scale(1.05)}
.sticky-wa:active{transform:scale(0.95)}
@media(min-width:768px){.sticky-wa{display:none}}

footer{
text-align:center;
padding:50px 24px;
font-size:12px;
color:var(--muted);
letter-spacing:0.5px;
border-top:1px solid var(--line);
}
footer a{color:var(--primary);text-decoration:none}

.skeleton{
height:380px;
background:linear-gradient(90deg,var(--bg-soft) 25%,#F7F5F2 50%,var(--bg-soft) 75%);
background-size:200% 100%;
border-radius:10px;
animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.error-box{
grid-column:1/-1;
text-align:center;
padding:60px 20px;
background:var(--white);
border:1px solid var(--line);
border-radius:10px;
}
</style>
</head>

<body>

<header class="hero reveal">
<h1>Promo Undangan Digital 90K</h1>
<p>Desain elegan, fitur lengkap, siap pakai tanpa ribet.</p>
<p class="social-proof">Diskon 40% • Hemat 60rb • Dipakai 1.200+ pasangan</p>
<p id="countdown"></p>
</header>

<section class="catalog reveal">
<div class="catalog-head">
<h2>Pilih Template Favoritmu</h2>
<p>Semua bisa custom warna, musik, dan foto</p>
</div>
<div id="catalog-grid" class="grid">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>
